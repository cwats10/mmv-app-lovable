name: Sync from Main

on:
  push:
    branches:
      - main
    paths:
      - 'src/**'
      - 'public/**'
      - 'supabase/**'
      - 'tsconfig*.json'
      - 'vite.config.ts'
      - 'eslint.config.js'
      - 'postcss.config.js'
      - 'index.html'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout mmv-app-lovable repository
        uses: actions/checkout@v4
        with:
          repository: cwats10/mmv-app-lovable
          token: ${{ secrets.GITHUB_TOKEN }}
          path: mmv-app-lovable

      - name: Checkout mmv-app repository
        uses: actions/checkout@v4
        with:
          repository: cwats10/mmv-app
          token: ${{ secrets.GITHUB_TOKEN }}
          path: mmv-app

      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Sync source code and configuration
        working-directory: mmv-app-lovable
        run: |
          # Copy src directory
          if [ -d "../mmv-app/src" ]; then
            rsync -av --delete ../mmv-app/src/ src/
          fi
          
          # Copy public directory
          if [ -d "../mmv-app/public" ]; then
            rsync -av --delete ../mmv-app/public/ public/
          fi
          
          # Copy supabase directory
          if [ -d "../mmv-app/supabase" ]; then
            rsync -av --delete ../mmv-app/supabase/ supabase/
          fi
          
          # Sync TypeScript and config files
          for file in tsconfig.json tsconfig.app.json tsconfig.node.json vite.config.ts eslint.config.js postcss.config.js index.html; do
            if [ -f "../mmv-app/$file" ]; then
              cp ../mmv-app/$file $file
            fi
          done

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          path: mmv-app-lovable
          commit-message: 'sync: update from mmv-app'
          title: 'Sync: Update from mmv-app'
          body: 'Automated sync of changes from mmv-app'
          branch: sync/from-main
          delete-branch: true
