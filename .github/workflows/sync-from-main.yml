name: Sync from Main

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    
    steps:
      - name: Checkout mmv-app-lovable
        uses: actions/checkout@v4
        with:
          repository: cwats10/mmv-app-lovable
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download from mmv-app
        run: |
          # Create temp directory
          mkdir -p /tmp/main-source
          cd /tmp/main-source
          
          # Download main repo as zip
          curl -L https://github.com/cwats10/mmv-app/archive/refs/heads/main.zip -o main.zip
          unzip -q main.zip
          
          # Copy files
          cd $GITHUB_WORKSPACE
          
          if [ -d "/tmp/main-source/mmv-app-main/src" ]; then
            cp -r /tmp/main-source/mmv-app-main/src/* src/ 2>/dev/null || true
          fi
          
          if [ -d "/tmp/main-source/mmv-app-main/public" ]; then
            cp -r /tmp/main-source/mmv-app-main/public/* public/ 2>/dev/null || true
          fi
          
          if [ -d "/tmp/main-source/mmv-app-main/supabase" ]; then
            cp -r /tmp/main-source/mmv-app-main/supabase/* supabase/ 2>/dev/null || true
          fi
          
          for file in tsconfig.json tsconfig.app.json tsconfig.node.json vite.config.ts eslint.config.js postcss.config.js index.html; do
            if [ -f "/tmp/main-source/mmv-app-main/$file" ]; then
              cp /tmp/main-source/mmv-app-main/$file . 2>/dev/null || true
            fi
          done

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: 'sync: update from mmv-app'
          title: 'Sync: Update from mmv-app'
          body: 'Automated sync of changes from mmv-app'
          branch: sync/from-main
          delete-branch: true
